server:
  port: 8080

spring:
  application:
    name: leo-shop-api
  datasource:
    url: jdbc:postgresql://localhost:5432/leoshop
    driver-class-name: org.postgresql.Driver
    username: leo
    password:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: admin
      password: admin123

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

nowpayments:
  api-key: ${NOWPAYMENTS_API_KEY:sandbox-key}
  ipn-secret: ${NOWPAYMENTS_IPN_SECRET:sandbox-secret}
  base-url: ${NOWPAYMENTS_BASE_URL:https://api.nowpayments.io/v1}

app:
  upload:
    dir: uploads/products
  jwt:
    secret: leo-shop-secret-key-for-jwt-token-generation-2026
    expiration: 86400000
